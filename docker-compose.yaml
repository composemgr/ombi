# nginx proxy address - http://172.17.0.1:3579

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  ombi:
    image: linuxserver/ombi:latest
    container_name: ombi-app
    restart: unless-stopped
    logging: *default-logging
    networks:
      - ombi
    ports:
      - "3579:3579"
    environment:
      TZ: ${TZ:-America/New_York}
      PUID: ${SERVICE_USER:-1000}
      PGID: ${SERVICE_GROUP:-1000}
    volumes:
      - ./rootfs/config/ombi:/config
      - ./rootfs/data/ombi:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3579"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ombi:
    external: false
